        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap');
        :root {

        html, body { background: var(--bg-main); color: var(--text-main); margin: 0; font-family: 'Chakra Petch', sans-serif; min-height: 100vh; display: flex; flex-direction: column; transition: background 0.3s, color 0.3s; }
        .header { background: var(--bg-panel); border-bottom: 2px solid var(--accent); padding: 0 30px; display: flex; align-items: center; justify-content: space-between; height: 70px; box-shadow: 0 4px 15px var(--accent-glow); flex-shrink: 0; transition: background 0.3s, border-color 0.3s; }
        .logo { color: var(--accent); font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; text-shadow: 0 0 10px var(--accent-glow); transition: color 0.3s; flex-shrink: 1; max-width: 35%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nav-container { display: flex; align-items: center; gap: 5px; height: 100%; }
        .nav-btn { color: var(--text-muted); text-decoration: none; font-weight: 600; padding: 10px 15px; border-radius: 6px; transition: 0.3s; font-size: 15px; text-transform: uppercase; border: 1px solid transparent; }
        .nav-btn:hover, .nav-btn.active { color: var(--text-main); background: rgba(128,128,128,0.1); border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .theme-btn { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 10px; margin-left: 10px; color: var(--text-muted); transition: 0.3s; flex-shrink: 0; }

        .dropdown:hover .drop-btn { color: var(--text-main); border-color: var(--accent); background: rgba(128,128,128,0.1); box-shadow: 0 0 10px var(--accent-glow); }
        .dropdown-content { display: none; position: absolute; top: 70px; right: 0; background: var(--bg-panel); min-width: 200px; border: 2px solid var(--accent); border-radius: 0 0 8px 8px; box-shadow: 0 10px 20px var(--shadow); z-index: 100; }
        .dropdown-content a { color: var(--text-muted); padding: 12px 20px; text-decoration: none; display: block; font-weight: 600; border-bottom: 1px solid var(--border); transition: 0.2s; }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; flex-grow: 1; width: 100%; box-sizing: border-box; }
        .seo-footer { margin-top: 20px; padding: 30px; background: var(--bg-panel); border-radius: 12px; border-left: 4px solid var(--accent); transition: background 0.3s; }

        .seo-footer p { color: var(--text-muted); line-height: 1.6; margin: 0; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; margin-top: 30px; }
        .game-card { background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px; overflow: hidden; text-decoration: none; transition: 0.3s; display: flex; flex-direction: column; }
        .game-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 20px var(--accent-glow); }
        .game-img { width: 100%; height: 140px; background: var(--bg-main); display: flex; align-items: center; justify-content: center; border-bottom: 2px solid var(--border); transition: 0.3s; overflow: hidden; }

        .game-title { padding: 15px; color: var(--text-main); font-size: 16px; font-weight: 700; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Interactive Pre-Play Box Styles */
        .game-wrapper { width: 100%; height: 600px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; transition: background 0.3s, border-color 0.3s; overflow: hidden; }
        .pre-play-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 25px; z-index: 10; }
        
        /* The animated background image */
        .pre-play-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; animation: kenBurns 20s infinite alternate ease-in-out; }

        /* The dark overlay so text is readable */

        /* The content above the image */
        .pre-play-content { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .btn-play { padding: 20px 50px; background: linear-gradient(45deg, var(--accent), var(--accent-alt)); color: var(--btn-text); border: none; font-size: 24px; font-weight: 700; cursor: pointer; border-radius: 8px; text-transform: uppercase; font-family: 'Chakra Petch', sans-serif; transition: 0.2s; box-shadow: 0 0 20px var(--accent-glow); white-space: nowrap; }

        .site-footer { background: var(--bg-panel); border-top: 2px solid var(--border); padding: 20px; text-align: center; margin-top: auto; transition: background 0.3s; }
        .site-footer a { color: var(--text-muted); text-decoration: none; margin: 0 15px; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .site-footer a:hover { color: var(--accent); }
        .text-page { background: var(--bg-panel); padding: 40px; border-radius: 12px; border-top: 4px solid var(--accent); color: var(--text-muted); line-height: 1.8; font-family: sans-serif; transition: background 0.3s; }
        .text-page h1 { color: var(--text-main); margin-top: 0; font-family: 'Chakra Petch', sans-serif; font-size: 32px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .text-page h2 { color: var(--accent); margin-top: 30px; font-family: 'Chakra Petch', sans-serif; }
        .page-title { color: var(--text-main); text-align: center; margin-top: 0; font-size: 36px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--accent-glow); }
        .ad-container { width: 100%; max-width: 970px; margin: 20px auto; background: var(--bg-panel); border: 1px dashed var(--text-muted); min-height: 90px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); border-radius: 8px; font-family: sans-serif; text-transform: uppercase; letter-spacing: 2px; transition: background 0.3s; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(5px); }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-wrapper { width: 90vw; height: 85vh; max-width: 1200px; position: relative; display: flex; flex-direction: column; }
        .modal-close { position: absolute; top: -40px; right: 0; font-size: 40px; color: #fff; background: none; border: none; cursor: pointer; z-index: 10001; transition: 0.2s; line-height: 1; }
        .modal-close:hover { color: var(--accent); transform: scale(1.1); }
        .modal-content { width: 100%; height: 100%; background: #000; border-radius: 12px; border: 2px solid var(--border); overflow: hidden; box-shadow: 0 0 30px var(--shadow); }
        .modal-fullscreen-btn { position: absolute; bottom: -50px; right: 0; background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .modal-fullscreen-btn:hover { border-color: var(--accent); color: var(--accent); }

        @media (max-width: 768px) {
        	.logo { font-size: 18px; max-width: 100%; }

            .nav-container { width: 100%; overflow-x: auto; padding-bottom: 5px; justify-content: flex-start; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }

            .nav-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

            .theme-btn { margin-left: auto; }
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
            .game-img { height: 110px; }
            .btn-play { font-size: 20px; padding: 15px 30px; }

            .modal-wrapper { width: 100vw; height: 100vh; }
            .modal-content { border-radius: 0; border: none; }

            .modal-fullscreen-btn { bottom: 15px; right: 15px; background: rgba(0,0,0,0.7); }
        }
    </style>

    <script>
    let loaded = false;
    function initUI() {
        if (loaded) return;
        loaded = true;
        Promise.all([fetch('./category.json').then(r=>r.json()), fetch('./games.json').then(r=>r.json())])
        .then(([cats, gms]) => {
            const maxVis = 6;
            const visCats = cats.slice(0, maxVis);
            const hidCats = cats.slice(maxVis);

            let menu = '<a href="/" class="logo">snowrider-3d-unblocked.github.io</a><div class="nav-container">';
            visCats.forEach(c => menu += '<a href="./'+c.slug+'.html" class="nav-btn '+(c.id==='elastic-man'?'active':'')+'">'+c.title+'</a>');
            if(hidCats.length > 0) {
                menu += '<div class="dropdown"><button class="drop-btn">More ▾</button><div class="dropdown-content">';
                hidCats.forEach(c => menu += '<a href="./'+c.slug+'.html">'+c.title+'</a>');
                menu += '</div></div>';
            }
            menu += '<button id="theme-btn" class="theme-btn" aria-label="Toggle Theme"></button>';
            menu += '</div>';
            const hdr = document.getElementById('dynamic-header');
            if(hdr) hdr.innerHTML = menu;

            const themeBtn = document.getElementById('theme-btn');
            const sunSvg = '<svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z"/></svg>';
            const moonSvg = '<svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4C12.92 3.04 12.46 3 12 3zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7c.18 0 .35.02.53.04-1.25.96-2.03 2.45-2.03 4.1 0 2.89 2.36 5.25 5.25 5.25 1.65 0 3.14-.78 4.1-2.03.02.18.04.35.04.53 0 3.86-3.14 7-7 7z"/></svg>';
            const updateThemeIcon = () => { if(themeBtn) themeBtn.innerHTML = document.documentElement.getAttribute('data-theme') === 'light' ? moonSvg : sunSvg; };
            updateThemeIcon();
            if(themeBtn) {
                themeBtn.onclick = () => {
                    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
                    const newTheme = isLight ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                    updateThemeIcon();
                };
            }

            const gridContainer = document.getElementById('dynamic-grid');
            if(gridContainer) {
                let html = '';
                const renderCards = (list) => {
                    let str = '<div class="games-grid">';
                    list.forEach(g => {
                        let link = g.id === 'snow-rider-3d' ? '/' : './'+g.slug+'.html';
                        str += '<a href="'+link+'" class="game-card"><div class="game-img"><img src="./images/'+g.id+'-281d02.png" alt="'+g.name+'" width="100%" height="100%" style="object-fit:cover;"></div><div class="game-title">'+g.name+'</div></a>';
                    });
                    return str + '</div>';
                };

                if ('game' === 'category') {
                    let toShow = 'elastic-man' === 'all' ? gms : gms.filter(g => g.categoryIds.includes('elastic-man'));
                    html = renderCards(toShow);
                } else {
                    let sourceList = ('game' === 'game') ? gms.filter(g => g.id !== 'elastic-man') : gms;
                    let popGames = sourceList.slice(0, 28);
                    let newGames = sourceList.slice(28, 56);
                    
                    if(popGames.length > 0) html += '<h2 class="rec-title">Popular Games</h2>' + renderCards(popGames);
                    if(newGames.length > 0) html += '<h2 class="rec-title" style="margin-top: 50px;">New Games</h2>' + renderCards(newGames);
                }
                gridContainer.innerHTML = html;
            }

            const closeBtn = document.getElementById('closeModal');
            if(closeBtn) {
                closeBtn.onclick = () => {
                    document.getElementById('gameModal').classList.remove('active');
                    setTimeout(() => { document.getElementById('modalContent').innerHTML = ''; }, 300);
                    document.body.style.overflow = 'auto';
                };
            }
            const fsBtn = document.getElementById('modalFullscreen');
            if(fsBtn) {
                fsBtn.onclick = () => {
                    let elem = document.querySelector(".modal-wrapper");
                    if (elem.requestFullscreen) elem.requestFullscreen();
                    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                };
            }
        }).catch(e => console.log(""));
    }
    ['mousemove', 'scroll', 'touchstart'].forEach(evt => window.addEventListener(evt, initUI, { once: true }));
    

        document.getElementById('playBtn').onclick = function() { 
            var frameStr = '<iframe src="./frames/class-98250.html" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>';
            if(window.innerWidth <= 768) {
                document.getElementById('modalContent').innerHTML = frameStr; 
                document.getElementById('gameModal').classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                document.getElementById('gw').innerHTML = frameStr;
                document.getElementById('gw').style.padding = '0';
            }
        };
        document.getElementById('fullscreen_btn').onclick = function() {
            let elem = document.getElementById("gw");
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        };
    </script>
